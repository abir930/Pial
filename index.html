<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Pial Ahmed!</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #f5efe4;
    --gold: #c9a84c;
    --gold-light: #e8c97a;
    --deep: #1a0f00;
    --warm: #8b3a0f;
    --blush: #f0c8a0;
    --dark-bg: #0d0800;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--dark-bg);
    min-height: 100vh;
    font-family: 'DM Mono', monospace;
    overflow-x: hidden;
    cursor: none;
  }
  .cursor {
    position: fixed; width: 12px; height: 12px;
    background: var(--gold); border-radius: 50%;
    pointer-events: none; z-index: 9999;
    transform: translate(-50%, -50%);
    mix-blend-mode: screen; transition: transform 0.1s;
  }
  .stars { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
  .star {
    position: absolute; background: var(--gold-light); border-radius: 50%;
    animation: twinkle var(--dur) var(--delay) infinite ease-in-out alternate;
  }
  @keyframes twinkle {
    from { opacity: 0.1; transform: scale(0.8); }
    to   { opacity: 0.9; transform: scale(1.2); }
  }
  .orb { position: fixed; border-radius: 50%; filter: blur(80px); pointer-events: none; z-index: 0; animation: drift var(--d) var(--delay) infinite ease-in-out alternate; }
  .orb1 { width:420px; height:420px; background: rgba(201,168,76,0.12); top:-100px; left:-100px; --d:14s; --delay:0s; }
  .orb2 { width:300px; height:300px; background: rgba(139,58,15,0.15); bottom:-50px; right:-80px; --d:11s; --delay:-4s; }
  @keyframes drift { from { transform: translate(0,0); } to { transform: translate(40px,30px); } }

  .page {
    position: relative; z-index: 1;
    min-height: 100vh;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 50px 24px; gap: 0;
  }

  .date-badge {
    font-size: 0.7rem; letter-spacing: 0.3em; color: var(--gold);
    opacity: 0; animation: fadeUp 0.8s 0.2s forwards ease;
    margin-bottom: 24px; text-transform: uppercase;
  }
  .ornament {
    display: flex; align-items: center; gap: 16px;
    opacity: 0; animation: fadeUp 0.8s 0.4s forwards ease; margin-bottom: 20px;
  }
  .ornament-line { width: 80px; height: 1px; background: linear-gradient(90deg, transparent, var(--gold)); }
  .ornament-line.rev { background: linear-gradient(90deg, var(--gold), transparent); }
  .ornament-diamond { width: 8px; height: 8px; background: var(--gold); transform: rotate(45deg); }

  .wishes {
    font-size: 0.7rem; letter-spacing: 0.5em; color: var(--blush);
    text-transform: uppercase; opacity: 0; animation: fadeUp 0.8s 0.5s forwards ease; margin-bottom: 12px;
  }
  .birthday-text {
    font-family: 'Playfair Display', serif;
    font-size: clamp(3rem, 9vw, 7rem);
    font-weight: 900; font-style: italic; line-height: 0.9;
    background: linear-gradient(135deg, var(--gold-light) 0%, var(--gold) 40%, var(--warm) 70%, var(--gold-light) 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    opacity: 0; animation: fadeUp 1s 0.6s forwards ease, shimmer 4s 1.6s infinite linear;
    background-size: 300% 100%; text-align: center;
    filter: drop-shadow(0 0 40px rgba(201,168,76,0.3));
  }
  @keyframes shimmer { 0% { background-position: 0% 50%; } 100% { background-position: 300% 50%; } }
  .name {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2.4rem, 7vw, 5.5rem);
    font-weight: 700; color: var(--cream); letter-spacing: 0.04em;
    text-align: center; line-height: 1;
    opacity: 0; animation: fadeUp 1s 0.85s forwards ease; margin-top: 6px;
  }
  .name span { color: var(--gold-light); }

  /* ── SLIDESHOW ── */
  .slideshow-wrap {
    margin-top: 44px;
    opacity: 0; animation: fadeUp 1s 1.0s forwards ease;
    width: 100%; max-width: 500px;
  }
  .slideshow {
    position: relative;
    width: 100%;
    aspect-ratio: 4/3;
    border-radius: 16px;
    overflow: hidden;
    box-shadow: 0 0 0 2px var(--gold), 0 0 40px rgba(201,168,76,0.25), 0 20px 60px rgba(0,0,0,0.6);
  }
  .slide {
    position: absolute; inset: 0;
    opacity: 0; transition: opacity 1s ease;
    display: flex; align-items: center; justify-content: center;
  }
  .slide.active { opacity: 1; }
  .slide img {
    width: 100%; height: 100%; object-fit: cover;
  }
  /* polaroid overlay */
  .slide::after {
    content: ''; position: absolute; inset: 0;
    background: linear-gradient(180deg, transparent 60%, rgba(13,8,0,0.7) 100%);
    pointer-events: none;
  }

  /* Gold frame corners */
  .frame-corner {
    position: absolute; width: 24px; height: 24px; z-index: 3;
    pointer-events: none;
  }
  .frame-corner.tl { top: 10px; left: 10px; border-top: 2px solid var(--gold); border-left: 2px solid var(--gold); }
  .frame-corner.tr { top: 10px; right: 10px; border-top: 2px solid var(--gold); border-right: 2px solid var(--gold); }
  .frame-corner.bl { bottom: 10px; left: 10px; border-bottom: 2px solid var(--gold); border-left: 2px solid var(--gold); }
  .frame-corner.br { bottom: 10px; right: 10px; border-bottom: 2px solid var(--gold); border-right: 2px solid var(--gold); }

  /* nav buttons */
  .slide-btn {
    position: absolute; top: 50%; transform: translateY(-50%);
    z-index: 10; background: rgba(201,168,76,0.18);
    border: 1px solid var(--gold); color: var(--gold);
    width: 38px; height: 38px; border-radius: 50%;
    font-size: 1.1rem; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.2s, transform 0.2s;
    backdrop-filter: blur(4px);
  }
  .slide-btn:hover { background: rgba(201,168,76,0.4); transform: translateY(-50%) scale(1.1); }
  .slide-btn.prev { left: 12px; }
  .slide-btn.next { right: 12px; }

  /* dots */
  .dots {
    display: flex; justify-content: center; gap: 8px; margin-top: 14px;
  }
  .dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: rgba(201,168,76,0.3); border: 1px solid var(--gold);
    cursor: pointer; transition: background 0.3s, transform 0.2s;
  }
  .dot.active { background: var(--gold); transform: scale(1.3); }

  /* slide counter */
  .slide-counter {
    text-align: center; margin-top: 8px;
    font-size: 0.65rem; letter-spacing: 0.3em; color: var(--gold); opacity: 0.6;
  }

  .message-wrap {
    margin-top: 36px; max-width: 480px; text-align: center;
    opacity: 0; animation: fadeUp 1s 1.2s forwards ease;
  }
  .message {
    font-family: 'Playfair Display', serif; font-style: italic;
    font-size: clamp(0.95rem, 2.2vw, 1.15rem);
    color: var(--blush); line-height: 1.8; opacity: 0.85;
  }

  /* Candles */
  .candles {
    display: flex; gap: 16px; margin-top: 40px;
    opacity: 0; animation: fadeUp 0.8s 1.4s forwards ease; align-items: flex-end;
  }
  .candle { display: flex; flex-direction: column; align-items: center; animation: candleWobble 3s infinite ease-in-out; animation-delay: var(--cw); }
  @keyframes candleWobble { 0%,100% { transform: rotate(-1deg); } 50% { transform: rotate(1deg); } }
  .flame-wrap { position: relative; width: 18px; height: 30px; margin-bottom: -2px; }
  .flame {
    position: absolute; bottom: 0; left: 50%; transform: translateX(-50%);
    width: 12px; height: 22px;
    background: radial-gradient(ellipse at 50% 100%, #fff 0%, #ffe066 25%, #ff9a00 55%, rgba(255,80,0,0) 90%);
    border-radius: 50% 50% 30% 30%;
    animation: flicker 0.6s infinite alternate ease-in-out; animation-delay: var(--cw); filter: blur(0.5px);
  }
  .glow {
    position: absolute; bottom: 0; left: 50%; transform: translateX(-50%);
    width: 22px; height: 30px;
    background: radial-gradient(ellipse, rgba(255,200,50,0.5) 0%, transparent 70%);
    border-radius: 50%; animation: flicker 0.6s infinite alternate ease-in-out; animation-delay: var(--cw);
  }
  @keyframes flicker {
    from { transform: translateX(-50%) scaleY(1) scaleX(1); opacity: 1; }
    to   { transform: translateX(-50%) scaleY(0.88) scaleX(1.08); opacity: 0.9; }
  }
  .candle-body {
    width: 14px; height: var(--ch);
    background: linear-gradient(90deg, var(--gold) 0%, var(--gold-light) 40%, var(--gold) 100%);
    border-radius: 3px 3px 2px 2px;
    box-shadow: inset -3px 0 6px rgba(0,0,0,0.25), 0 0 8px rgba(201,168,76,0.3);
  }
  .wax-drop { width: 14px; height: 6px; background: var(--gold-light); border-radius: 0 0 8px 8px; opacity: 0.6; }

  /* Confetti */
  .confetti-piece {
    position: fixed; width: var(--cw2); height: var(--ch2);
    background: var(--cc); top: -20px; left: var(--cl);
    opacity: 0; border-radius: var(--cr);
    animation: confettiFall var(--cd) var(--cde) infinite linear; z-index: 2; pointer-events: none;
  }
  @keyframes confettiFall {
    0%   { transform: translateY(0) rotate(0deg); opacity: 1; }
    100% { transform: translateY(110vh) rotate(720deg); opacity: 0.3; }
  }

  .footer {
    margin-top: 48px; font-size: 0.65rem; letter-spacing: 0.3em;
    color: var(--gold); opacity: 0; text-transform: uppercase;
    animation: fadeUp 0.8s 1.8s forwards ease;
  }
  .footer span { opacity: 0.5; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(24px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @media (max-width: 480px) { .ornament-line { width: 40px; } .candles { gap: 10px; } }
</style>
</head>

      <button class="slide-btn next" onclick="changeSlide(1)">&#8594;</button>
    </div>
    <div class="dots" id="dots">
      <div class="dot active" onclick="goTo(0)"></div>
      <div class="dot" onclick="goTo(1)"></div>
      <div class="dot" onclick="goTo(2)"></div>
    </div>
    <div class="slide-counter" id="counter">1 / 3</div>
  </div>

  <div class="message-wrap">
    <p class="message">
      Tumi shobsomoy amader jibone<br>
      ekta bishesh jagah rekheche, Pial.<br>
      <em>Janmadin Mubarak, bhai! 🎂✨</em>
    </p>
  </div>

  <div class="candles" id="candles"></div>
  <div class="footer"><span>✦</span> With love &amp; best wishes <span>✦</span></div>
</div>

<script>
  // Cursor
  const cursor = document.getElementById('cursor');
  document.addEventListener('mousemove', e => { cursor.style.left = e.clientX+'px'; cursor.style.top = e.clientY+'px'; });

  // Stars
  const starsEl = document.getElementById('stars');
  for (let i = 0; i < 80; i++) {
    const s = document.createElement('div'); s.className = 'star';
    const size = Math.random()*2.5+0.5;
    s.style.cssText = `width:${size}px;height:${size}px;left:${Math.random()*100}%;top:${Math.random()*100}%;--dur:${(Math.random()*3+2).toFixed(1)}s;--delay:${(Math.random()*4).toFixed(1)}s;opacity:${Math.random()*0.4};`;
    starsEl.appendChild(s);
  }

  // Candles
  const candlesEl = document.getElementById('candles');
  [38,52,44,60,48,40,56].forEach((h,i) => {
    const d = (i*0.15).toFixed(2)+'s';
    candlesEl.innerHTML += `<div class="candle" style="--cw:${d}"><div class="flame-wrap"><div class="glow" style="--cw:${d}"></div><div class="flame" style="--cw:${d}"></div></div><div class="candle-body" style="--ch:${h}px"></div><div class="wax-drop"></div></div>`;
  });

  // Confetti
  const confEl = document.getElementById('confetti');
  const colors = ['#c9a84c','#e8c97a','#f0c8a0','#fff5d6','#8b3a0f','#ff9a44','#ffe066'];
  for (let i = 0; i < 50; i++) {
    const p = document.createElement('div'); p.className = 'confetti-piece';
    p.style.cssText = `--cw2:${Math.random()*7+4}px;--ch2:${Math.random()*12+5}px;--cc:${colors[Math.floor(Math.random()*colors.length)]};--cl:${Math.random()*100}%;--cr:${['50%','0%','2px'][Math.floor(Math.random()*3)]};--cd:${(Math.random()*5+4).toFixed(1)}s;--cde:${(Math.random()*6).toFixed(1)}s;`;
    confEl.appendChild(p);
  }

  // Slideshow
  let current = 0;
  const slides = document.querySelectorAll('.slide');
  const dots   = document.querySelectorAll('.dot');
  const counter = document.getElementById('counter');
  let timer = setInterval(() => changeSlide(1), 4000);

  function goTo(n) {
    slides[current].classList.remove('active');
    dots[current].classList.remove('active');
    current = (n + slides.length) % slides.length;
    slides[current].classList.add('active');
    dots[current].classList.add('active');
    counter.textContent = (current+1) + ' / ' + slides.length;
    clearInterval(timer);
    timer = setInterval(() => changeSlide(1), 4000);
  }
  function changeSlide(dir) { goTo(current + dir); }
</script>
